databases:
  - name: repositorio-db
    databaseName: repositorio
    user: repositorio_user
    plan: free

services:
  - type: web
    name: recursos
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repositorio-db
          property: connectionString
